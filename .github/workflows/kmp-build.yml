name: KMP Build & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  KOTLIN_VERSION: '2.0.0'

jobs:
  # ==========================================
  # Android Build Job
  # ==========================================
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Tests
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      - name: Build Android Debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Build Android Release AAB
        if: github.ref == 'refs/heads/main'
        run: ./gradlew :composeApp:bundleRelease --stacktrace
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release AAB
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: composeApp/build/outputs/bundle/release/*.aab
          retention-days: 14

  # ==========================================
  # iOS Build Job
  # ==========================================
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Generate Xcode Project
        run: ./gradlew :composeApp:generateXcodeProject

      - name: Install Pods Dependencies
        working-directory: iosApp
        run: pod install

      - name: Build iOS App (Simulator)
        working-directory: iosApp
        run: |
          xcodebuild \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Run iOS Tests
        working-directory: iosApp
        run: |
          xcodebuild test \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive iOS App
        if: github.ref == 'refs/heads/main'
        working-directory: iosApp
        run: |
          xcodebuild archive \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -archivePath build/iosApp.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            iosApp/build/
            iosApp/*.xcarchive
          retention-days: 7

  # ==========================================
  # Web (WASM/JS) Build Job
  # ==========================================
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Web (WASM)
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --stacktrace

      - name: Build Web (JS Fallback)
        run: ./gradlew :composeApp:jsBrowserDistribution --stacktrace

      - name: Upload Web Build (WASM)
        uses: actions/upload-artifact@v4
        with:
          name: web-wasm-build
          path: composeApp/build/dist/wasmJs/productionExecutable/
          retention-days: 7

      - name: Upload Web Build (JS)
        uses: actions/upload-artifact@v4
        with:
          name: web-js-build
          path: composeApp/build/dist/js/productionExecutable/
          retention-days: 7

      - name: Deploy to GitHub Pages (Optional)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./composeApp/build/dist/wasmJs/productionExecutable/
          cname: your-domain.com  # আপনার ডোমেইন দিন

  # ==========================================
  # Desktop Build Job (Bonus)
  # ==========================================
  build-desktop:
    name: Build Desktop Apps
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle Permission
        run: chmod +x gradlew
        shell: bash

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Desktop App
        run: ./gradlew :composeApp:packageDistributionForCurrentOS --stacktrace

      - name: Upload Desktop Build
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: composeApp/build/compose/binaries/main/
          retention-days: 7

  # ==========================================
  # Code Quality & Analysis
  # ==========================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      - name: Run Detekt (Static Analysis)
        run: ./gradlew detekt --stacktrace
        continue-on-error: true

      - name: Run Ktlint Format Check
        run: ./gradlew ktlintCheck --stacktrace
        continue-on-error: true

      - name: Generate Test Report
        run: ./gradlew koverXmlReport --stacktrace

      - name: Upload Code Quality Reports
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports
          path: |
            build/reports/detekt/
            build/reports/ktlint/
            build/reports/kover/
          retention-days: 7

  # ==========================================
  # Release Job (Manual Trigger)
  # ==========================================
  create-release:
    name: Create Release
    needs: [build-android, build-ios, build-web, build-desktop]
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}