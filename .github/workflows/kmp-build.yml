name: 🎯 KMP Debug Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g"

jobs:
  # ==========================================
  # 🤖 Android Debug
  # ==========================================
  android:
    name: 🤖 Android Debug
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 👑 Fix Gradle Permission
        run: chmod +x ./gradlew

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🧪 Test
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      - name: 🔨 Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ==========================================
  # 🍎 iOS Debug
  # ==========================================
  ios:
    name: 🍎 iOS Debug
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 👑 Fix Gradle Permission
        run: chmod +x ./gradlew

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📱 Setup Xcode
        run: |
          sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer
          xcodebuild -version

      - name: 🧪 Install Pods
        run: |
          gem install cocoapods --no-document
          cd iosApp && pod install

      - name: 📦 Generate Xcode Project
        run: ./gradlew :composeApp:generateXcodeProject

      - name: 🔨 Build iOS
        working-directory: iosApp
        run: |
          xcodebuild build \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  # ==========================================
  # 🌐 Web Debug (WASM + JS)
  # ==========================================
  web:
    name: 🌐 Web Debug
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 👑 Fix Gradle Permission
        run: chmod +x ./gradlew

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔨 Build WASM
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --stacktrace

      - name: 🔨 Build JS
        run: ./gradlew :composeApp:jsBrowserDistribution --stacktrace

      - name: 📤 Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: web-wasm
          path: composeApp/build/dist/wasmJs/productionExecutable/
          retention-days: 7

      - name: 📤 Upload JS
        uses: actions/upload-artifact@v4
        with:
          name: web-js
          path: composeApp/build/dist/js/productionExecutable/
          retention-days: 7

      - name: 🚀 Deploy to Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./composeApp/build/dist/wasmJs/productionExecutable/